services:
  postgres:
    image: postgres:16
    container_name: tokenmall-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: tokenmall
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: tokenmall-redis
    restart: always

  api:
    build:
      context: ../../apps/api
    container_name: tokenmall-api
    restart: always
    environment:
      APP_ENV: production
      APP_HOST: 0.0.0.0
      APP_PORT: 8000
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/tokenmall
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: ${JWT_SECRET:-change-me-jwt-secret}
      BAILIAN_API_KEY: ${BAILIAN_API_KEY}
      BAILIAN_API_BASE: ${BAILIAN_API_BASE:-https://dashscope.aliyuncs.com/compatible-mode/v1}
      TENCENT_API_KEY: ${TENCENT_API_KEY:-}
      TENCENT_API_BASE: ${TENCENT_API_BASE:-}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://49.232.143.230:13000}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@tokenmall.dev}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-Admin123456}
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis

  web:
    build:
      context: ../../apps/web
    container_name: tokenmall-web
    restart: always
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api}
      INTERNAL_API_PROXY_TARGET: http://api:8000
    ports:
      - "13001:3000"
    depends_on:
      - api

volumes:
  pgdata:
