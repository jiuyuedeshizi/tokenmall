services:
  postgres:
    image: postgres:16
    container_name: tokenmall-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: tokenmall
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: tokenmall-redis
    restart: always

  api:
    build:
      context: ../../apps/api
    container_name: tokenmall-api
    restart: always
    environment:
      APP_ENV: production
      APP_HOST: 0.0.0.0
      APP_PORT: 8000
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/tokenmall
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: ${JWT_SECRET:-change-me-jwt-secret}
      BAILIAN_API_KEY: ${BAILIAN_API_KEY}
      BAILIAN_API_BASE: ${BAILIAN_API_BASE:-https://dashscope.aliyuncs.com/compatible-mode/v1}
      TENCENT_API_KEY: ${TENCENT_API_KEY:-}
      TENCENT_API_BASE: ${TENCENT_API_BASE:-}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://49.232.143.230:13000}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@tokenmall.dev}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-Admin123456}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-465}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:-}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-TokenMall}
      SMTP_USE_SSL: ${SMTP_USE_SSL:-true}
      SMTP_USE_TLS: ${SMTP_USE_TLS:-false}
      ALIBABA_CLOUD_ACCESS_KEY_ID: ${ALIBABA_CLOUD_ACCESS_KEY_ID:-}
      ALIBABA_CLOUD_ACCESS_KEY_SECRET: ${ALIBABA_CLOUD_ACCESS_KEY_SECRET:-}
      ALIBABA_CLOUD_SMS_REGION: ${ALIBABA_CLOUD_SMS_REGION:-cn-hangzhou}
      ALIBABA_CLOUD_SMS_AUTH_ENABLED: ${ALIBABA_CLOUD_SMS_AUTH_ENABLED:-false}
      ALIBABA_CLOUD_SMS_SIGN_NAME: ${ALIBABA_CLOUD_SMS_SIGN_NAME:-}
      ALIBABA_CLOUD_SMS_TEMPLATE_CODE: ${ALIBABA_CLOUD_SMS_TEMPLATE_CODE:-}
      ALIBABA_CLOUD_SMS_TEMPLATE_PARAM: ${ALIBABA_CLOUD_SMS_TEMPLATE_PARAM:-{"code":"##code##","min":"5"}}
      ALIBABA_CLOUD_SMS_SCHEME_NAME: ${ALIBABA_CLOUD_SMS_SCHEME_NAME:-}
      ALIBABA_CLOUD_SMS_DEBUG_RETURN_DEMO_CODE: ${ALIBABA_CLOUD_SMS_DEBUG_RETURN_DEMO_CODE:-false}
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis

  web:
    build:
      context: ../../apps/web
    container_name: tokenmall-web
    restart: always
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api}
      INTERNAL_API_PROXY_TARGET: http://api:8000
    ports:
      - "13001:3000"
    depends_on:
      - api

volumes:
  pgdata:
